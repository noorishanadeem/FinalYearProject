{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h3>Delete Review</h3>
    <p>Delete Review for {{ review.booking.student.username }} on {{ review.booking.date }} {{ review.booking.time }}?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Delete</button>
        <a href="{% url 'my_reviews' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
