{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Leave Review for {{ booking.student.get_full_name }} ({{ booking.date }} at {{ booking.time }})</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Submit Review</button>
        <a href="{% url 'instructor_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
