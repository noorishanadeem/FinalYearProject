{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>My Students</h3>
    <a href="{% url 'instructor_dashboard' %}" class="btn btn-secondary mb-3">Back to Dashboard</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>View</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.username }}</td>
                <td>{{ student.email }}</td>
                <td>
                    <a href="{% url 'instructor_student_detail' student.id %}" class="btn btn-outline-primary btn-sm">
                        View Details
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No Student Found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
